<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventos DOM</title>
    <style>
        div#area {
            font: normal 20pt Arial, Helvetica, sans-serif;
            background-color: #348B0F;
            color: white;
            width: 200px;
            height: 200px;
            line-height: 200px;
            text-align: center;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div id="area" onclick="clicar()" onmouseenter="entrar()" onmouseout="sair()">
        Interaja...
    </div>

    <script>
        /*
            var a1 = window.document.getElementById('area2')
            a1.addEventListener('click', clicar)
            a1.addEventListener('mouseenter', entrar)
            a1.addEventListener('mouseout', sair)
        */

        var a = window.document.getElementById('area')
        function clicar() {
            a.innerText = 'Clicou!'
            a.style.backgroundColor = '#8C5A0F'
        }

        function entrar() {
            a.innerText = 'Entrou!'
            a.style.backgroundColor = '#8C0F84'
        }

        function sair() {
            a.innerText = 'Saiu!'
            a.style.backgroundColor = '#0F578C'
        }
    </script>
</body>
</html>
